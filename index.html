<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPIC FA | ANARCHIE - Boutique</title>
<link rel="stylesheet" href="style.css">
<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=AQ4y8L_AnxEHhCeKLGHE2b6vjZeYodp_E3pVvPM68IeP2k-RE4ICt_BVEtr2owIEgSOz5QMkPpSsxdVn&currency=EUR"></script>
</head>
<body>

<!-- Loader -->
<div id="loader"><div class="spinner"></div></div>

<!-- Header -->
<header>
  <h1>EPIC FA | ANARCHIE - Boutique</h1>
  <p>Soutiens le serveur!</p>
  <p class="subtitle">Profite de nos offres et boost ton aventure dès maintenant</p>
  <button class="admin-btn" onclick="openAdmin()">ADMIN PANEL</button>
</header>

<!-- Boutique Packs -->
<section class="packs"></section>

<!-- Admin Panel -->
<div id="adminPanel" class="admin-panel" style="display:none;">
  <div class="admin-container">
    <div class="admin-header">
      <h2>ADMIN PANEL — EPIC FA</h2>
      <button onclick="closeAdmin()">X</button>
    </div>
    <div class="admin-stats">
      <div class="stat">
        <h3>Revenus</h3>
        <p id="adminRevenue">0 €</p>
      </div>
      <div class="stat">
        <h3>Commandes</h3>
        <p id="adminOrders">0</p>
      </div>
    </div>

    <div class="admin-actions">
      <h3>Actions Admin</h3>
      <button class="admin-only" onclick="addCoinsManually()">Ajouter coins manuellement</button>
    </div>

    <div class="admin-orders">
      <h3>Historique joueurs</h3>
      <table>
        <thead>
          <tr>
            <th>Joueur</th>
            <th>Pack</th>
            <th>Montant</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Admin Login -->
<div id="adminLogin" class="admin-login">
  <div class="login-box">
    <h2>Connexion Admin</h2>
    <input id="adminUser" placeholder="Username" autocomplete="off">
    <input type="password" id="adminPassword" placeholder="Mot de passe" autocomplete="off">
    <button onclick="checkLogin()">Se connecter</button>
    <p id="loginError"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

 <p class="subtitle">Faite un Ticket sur le discord pour toute achat effectuer</p>
