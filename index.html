<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPIC FA | ANARCHIE - Boutique</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=AYMDoDHENvD1AFWCBfaCd4BQLoec8bbJac1qtdxAlDobcXn9VECJEGF-k8V4Z65IFxgF5aLaPucAYJcm&currency=EUR"></script>
</head>
<body>

<!-- LOADER -->
<div id="loader"><div class="spinner"></div></div>

<!-- HEADER -->
<header>
  <h1>EPIC FA | ANARCHIE - Boutique</h1>
  <p>Soutiens le serveur et améliore ton expérience RP !</p>
  <button onclick="discordLogin()" class="discord-login">Connexion Discord</button>
  <button class="admin-btn" onclick="openAdmin()">ADMIN PANEL</button>
</header>

<!-- BOUTIQUE -->
<section class="packs">
  <!-- Les cartes seront générées dynamiquement par script.js -->
</section>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin-panel" style="display:none;">
  <div class="admin-container">
    <div class="admin-header">
      <h2>ADMIN PANEL — EPIC FA</h2>
      <button onclick="closeAdmin()">X</button>
    </div>

    <div class="admin-stats">
      <div class="stat">
        <h3>Revenus</h3>
        <p id="adminRevenue">0 €</p>
      </div>
      <div class="stat">
        <h3>Commandes</h3>
        <p id="adminOrders">0</p>
      </div>
    </div>

    <div class="admin-actions">
      <h3>Actions Admin</h3>
      <button class="admin-only" onclick="giveCoins()">Donner coins</button>
      <button class="superadmin-only" onclick="editShopPrices()">Modifier prix boutique</button>
      <button class="superadmin-only" onclick="refundPayment()">Remboursement</button>
    </div>

    <div class="admin-orders">
      <h3>Historique joueurs</h3>
      <table>
        <thead>
          <tr>
            <th>Joueur</th>
            <th>Montant</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- LOGIN ADMIN -->
<div id="adminLogin" class="admin-login">
  <div class="login-box">
    <h2>Connexion Admin</h2>
    <input id="adminUser" placeholder="Username" autocomplete="off">
    <input type="password" id="adminPassword" placeholder="Mot de passe" autocomplete="off">
    <button onclick="checkLogin()">Se connecter</button>
    <p id="loginError"></p>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>Paiement sécurisé • Merci de soutenir EPIC FA | ANARCHIE</p>
</footer>

<!-- SCRIPT -->
<script src="script.js"></script>
</body>
</html>
