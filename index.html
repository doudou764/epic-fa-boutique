<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Boutique EPIC RP</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Loader -->
<div id="loader">
    <div class="spinner"></div>
</div>

<!-- Background -->
<div class="bg-animation"></div>

<!-- Contenu -->
<div class="container">

    <h1 class="title">BOUTIQUE OFFICIELLE EPIC RP</h1>
    <p class="subtitle">Boost ton expérience RP maintenant</p>

    <div class="shop">

        <div class="card">
            <h2>500 Coins</h2>
            <p class="price">3,99€</p>
            <div id="paypal-button-500"></div>
        </div>

        <div class="card popular">
            <div class="badge">POPULAIRE</div>
            <h2>1500 Coins</h2>
            <p class="price">9,99€</p>
            <div id="paypal-button-1500"></div>
        </div>

        <div class="card">
            <h2>3000 Coins</h2>
            <p class="price">18,99€</p>
            <div id="paypal-button-3000"></div>
        </div>

        <div class="card vip">
            <div class="badge gold">BONUS</div>
            <h2>4000 Coins</h2>
            <p class="price">24,99€</p>
            <small>+500 OFFERTS</small>
            <div id="paypal-button-4000"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
